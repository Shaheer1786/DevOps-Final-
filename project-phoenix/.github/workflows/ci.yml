name: Node.js CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./project-phoenix

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22 # Using a stable, non-deprecated LTS version
        cache: 'npm'
        cache-dependency-path: './project-phoenix/package-lock.json'

    - name: Install Dependencies
      run: npm ci

    - name: Run Unit Tests
      run: npm test