name: Node.js CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x] # Testing across LTS versions

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm' # Caches node_modules for faster subsequent runs

    - name: Install Dependencies
      run: npm ci # 'npm ci' is cleaner and faster for CI/CD environments than 'npm install'

    - name: Run Unit Tests
      run: npm test
