name: Node.js CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Install Dependencies
      # This explicitly forces npm to look inside your app folder
      run: npm ci
      working-directory: ./project-phoenix

    - name: Run Unit Tests
      # This explicitly forces the test to run inside your app folder
      run: npm test
      working-directory: ./project-phoenix