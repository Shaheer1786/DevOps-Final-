name: Node.js CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Dynamically Find and Run Build/Test
      run: |
        # Search for where package.json actually lives dynamically
        TARGET_DIR=$(find . -name "package.json" -not -path "*/node_modules/*" -exec dirname {} \;)
        echo "Found package.json in directory: $TARGET_DIR"
        cd "$TARGET_DIR"
        
        # Run clean install and test directly in that folder
        npm install
        npm test