name: Node.js CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    # ⬇️ ADD THIS BLOCK IF YOUR CODE IS IN A SUBFOLDER ⬇️
    defaults:
      run:
        working-directory: ./project-phoenix # Change this to your exact subfolder name if different

    strategy:
      matrix:
        node-version: [22.x, 24.x]

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: './project-phoenix/package-lock.json' # ⬅️ Point this to the subfolder too!

    - name: Install Dependencies
      run: npm ci

    - name: Run Unit Tests
      run: npm test